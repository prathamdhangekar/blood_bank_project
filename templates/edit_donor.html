<!DOCTYPE html>
<html>
<head>
    <title>Edit Donor - Blood Bank</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<!-- NAVBAR -->
<div class="navbar">
    <a class="logo" href="/">Blood Bank</a>
    <ul>
        <li><a href="/">Home</a></li>
        <li><a href="/register">Register</a></li>
        <li><a href="/login">Login</a></li>
        <li><a href="/view_donor">Donors</a></li>
        <li><a href="/view_doctor">Doctors</a></li>
        <li><a href="/view_patient">Patients</a></li>
        <li><a href="/report">Report</a></li>
    </ul>
</div>

<!-- PAGE CONTENT -->
<div class="container">

    <h2 class="page-title">Edit Donor</h2>

    <div class="form-box">

        <form method="POST" action="/edit_donor/{{ donor['id'] }}">

            <!-- Name -->
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="name" value="{{ donor['name'] }}" required>
            </div>

            <!-- Age -->
            <div class="form-group">
                <label>Age</label>
                <input type="number" name="age" value="{{ donor['age'] }}" required>
            </div>

            <!-- Gender -->
            <div class="form-group">
                <label>Gender</label>
                <select name="gender">
                    <option value="Male"   {% if donor['gender'] == 'Male' %}selected{% endif %}>Male</option>
                    <option value="Female" {% if donor['gender'] == 'Female' %}selected{% endif %}>Female</option>
                    <option value="Other"  {% if donor['gender'] == 'Other' %}selected{% endif %}>Other</option>
                </select>
            </div>

            <!-- Blood Group -->
            <div class="form-group">
                <label>Blood Group</label>
                <select name="blood_group">
                    <option value="A+"  {% if donor['blood_group'] == 'A+'  %}selected{% endif %}>A+</option>
                    <option value="A-"  {% if donor['blood_group'] == 'A-'  %}selected{% endif %}>A-</option>
                    <option value="B+"  {% if donor['blood_group'] == 'B+'  %}selected{% endif %}>B+</option>
                    <option value="B-"  {% if donor['blood_group'] == 'B-'  %}selected{% endif %}>B-</option>
                    <option value="O+"  {% if donor['blood_group'] == 'O+'  %}selected{% endif %}>O+</option>
                    <option value="O-"  {% if donor['blood_group'] == 'O-'  %}selected{% endif %}>O-</option>
                    <option value="AB+" {% if donor['blood_group'] == 'AB+' %}selected{% endif %}>AB+</option>
                    <option value="AB-" {% if donor['blood_group'] == 'AB-' %}selected{% endif %}>AB-</option>
                </select>
            </div>

            <!-- Mobile -->
            <div class="form-group">
                <label>Mobile Number</label>
                <input type="text" name="mobile" value="{{ donor['mobile'] }}" required>
            </div>

            <!-- Address -->
            <div class="form-group">
                <label>Address</label>
                <input type="text" name="address" value="{{ donor['address'] }}" required>
            </div>

            <!-- Email -->
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" value="{{ donor['email'] }}" required>
            </div>

            <!-- Password -->
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" value="{{ donor['password'] }}" required>
            </div>

            <!-- Buttons -->
            <div class="form-group">
                <input type="submit" value="Update Donor" class="btn btn-red">
                <a href="/view_donor" class="btn btn-blue">Cancel</a>
            </div>

        </form>

    </div>

</div>

<!-- FOOTER -->
<div class="footer">
    <p>&copy; 2024 Blood Bank Management System</p>
</div>

</body>
</html>
